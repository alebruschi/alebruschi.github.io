<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alessandro Bruschi – CV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f2f2f2;          /* light grey background */
      --text: #2b2b2b;        /* dark grey text */
      --muted: #6a6a6a;       /* softer grey */
      --accent: #1f1f1f;      /* slightly darker grey for headings */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: "Nimbus Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    header {
      border-bottom: 1px solid #dcdcdc;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: 28px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header .meta {
      font-size: 14px;
      color: var(--muted);
    }

    header .meta a {
      color: inherit;
      text-decoration: none;
